<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Sanctuary - 2D Multiplayer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #canvas-container {
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 4px solid #34495e;
            position: relative;
            display: none; /* Hidden until join */
        }
        canvas {
            background-color: #ecf0f1;
            display: block;
            cursor: crosshair;
        }
        
        /* Lobby Overlay */
        #lobby-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 62, 80, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .lobby-card {
            background: white;
            color: #2c3e50;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 90%;
        }
        .lobby-card h1 { margin-bottom: 20px; font-size: 24px; }
        .lobby-card input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
            box-sizing: border-box;
        }
        .lobby-card button {
            width: 100%;
            padding: 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        .lobby-card button:hover { background: #2980b9; }

        #ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            color: white;
            z-index: 10;
        }
        #chat-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 250px;
            height: 300px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            overflow: hidden;
            border: 1px solid #ccc;
        }
        #chat-messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            font-size: 12px;
            color: #333;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .chat-msg { word-wrap: break-word; }
        .chat-msg b { color: #2980b9; }
        #chat-input-area {
            display: flex;
            border-top: 1px solid #eee;
            padding: 5px;
        }
        #chat-input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 5px;
            font-size: 12px;
            outline: none;
        }
        #chat-send {
            margin-left: 5px;
            padding: 5px 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        /* Raise Hand & Moderation UI */
        #member-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 20;
            display: none;
        }
        #raise-hand-btn {
            padding: 12px 20px;
            background: #f1c40f;
            color: #2c3e50;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        #raise-hand-btn:active { transform: scale(0.95); }
        #raise-hand-btn.raised { background: #e67e22; color: white; }

        #moderation-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 220px;
            background: rgba(44, 62, 80, 0.9);
            border-radius: 8px;
            padding: 15px;
            display: none;
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border: 1px solid #f1c40f;
        }
        #moderation-panel h3 { margin-top: 0; font-size: 16px; color: #f1c40f; }
        #raised-hands-list { list-style: none; padding: 0; max-height: 200px; overflow-y: auto; }
        .hand-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
        }
        .allow-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
        }
        
        #notification-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
            z-index: 1000;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div id="notification-toast">You are now live!</div>
    <div id="lobby-overlay">
        <div class="lobby-card">
            <h1>Sanctuary Lobby</h1>
            <p>Please enter your name to join the service.</p>
            <input type="text" id="username-input" placeholder="Your Name" maxlength="20">
            <input type="password" id="passcode-input" placeholder="Admin Passcode (Optional)" maxlength="20">
            <button id="join-btn">Join Service</button>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="churchMap"></canvas>
        <div id="video-container" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden;"></div>
        <div id="ui-overlay">
            <div id="user-info">Connecting...</div>
            <div style="margin-top:5px; font-size: 10px; opacity: 0.8;">Click a seat to move & occupy</div>
        </div>

        <div id="chat-container">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type a message..." maxlength="100">
                <button id="chat-send">Send</button>
            </div>
        </div>

        <!-- Moderation & Raise Hand -->
        <div id="member-controls">
            <button id="raise-hand-btn">Raise Hand ✋</button>
        </div>

        <div id="moderation-panel">
            <h3>✋ Raised Hands</h3>
            <ul id="raised-hands-list">
                <!-- Dynamically populated -->
            </ul>
        </div>
    </div>

    <script id="firebase-config" type="application/json">
        {{ firebase_config | tojson }}
    </script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
