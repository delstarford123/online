<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Sanctuary - 2D Multiplayer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        #canvas-container {
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            border: 4px solid #34495e;
            position: relative;
            display: none; /* Hidden until join */
        }
        canvas {
            background-color: #ecf0f1;
            display: block;
            cursor: crosshair;
        }
        
        /* Lobby Overlay */
        #lobby-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(44, 62, 80, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        .lobby-card {
            background: white;
            color: #2c3e50;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .lobby-card h1 { margin-bottom: 10px; font-size: 28px; color: #3498db; }
        .lobby-card p { margin-bottom: 25px; color: #7f8c8d; }
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }
        .input-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: 600;
            color: #34495e;
        }
        .lobby-card input {
            width: 100%;
            padding: 12px;
            border: 2px solid #edeff2;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .lobby-card input:focus {
            border-color: #3498db;
            outline: none;
        }
        .lobby-card button {
            width: 100%;
            padding: 15px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .lobby-card button:hover { background: #2980b9; transform: translateY(-2px); }
        .lobby-card button:active { transform: translateY(0); }

        #ui-overlay {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            background: rgba(0,0,0,0.7);
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            color: white;
            z-index: 10;
        }
        #chat-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 250px;
            height: 300px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            overflow: hidden;
            border: 1px solid #ccc;
        }
        #chat-messages {
            flex: 1;
            padding: 10px;
            overflow-y: auto;
            font-size: 12px;
            color: #333;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .chat-msg { word-wrap: break-word; }
        .chat-msg b { color: #2980b9; }
        #chat-input-area {
            display: flex;
            border-top: 1px solid #eee;
            padding: 5px;
        }
        #chat-input {
            flex: 1;
            border: 1px solid #ddd;
            border-radius: 4px;
            padding: 5px;
            font-size: 12px;
            outline: none;
        }
        #chat-send {
            margin-left: 5px;
            padding: 5px 10px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        /* Raise Hand & Moderation UI */
        #member-controls {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 20;
            display: none;
        }
        #raise-hand-btn {
            padding: 12px 20px;
            background: #f1c40f;
            color: #2c3e50;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        #raise-hand-btn:active { transform: scale(0.95); }
        #raise-hand-btn.raised { background: #e67e22; color: white; }

        #moderation-panel {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 220px;
            background: rgba(44, 62, 80, 0.9);
            border-radius: 8px;
            padding: 15px;
            display: none;
            z-index: 20;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border: 1px solid #f1c40f;
        }
        #moderation-panel h3 { margin-top: 0; font-size: 16px; color: #f1c40f; }
        #raised-hands-list { list-style: none; padding: 0; max-height: 200px; overflow-y: auto; }
        .hand-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 13px;
        }
        .allow-btn {
            background: #2ecc71;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
        }
        
        #notification-toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #2ecc71;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
            z-index: 1000;
            font-weight: bold;
        }

        /* Bible Sidebar */
        #bible-sidebar {
            position: fixed;
            top: 0;
            right: -350px;
            width: 320px;
            height: 100%;
            background: white;
            color: #2c3e50;
            box-shadow: -5px 0 15px rgba(0,0,0,0.3);
            transition: right 0.3s ease;
            z-index: 50;
            display: flex;
            flex-direction: column;
            padding: 20px;
        }
        #bible-sidebar.open { right: 0; }
        #bible-toggle {
            position: absolute;
            top: 50%;
            left: -40px;
            width: 40px;
            height: 80px;
            background: #3498db;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border-radius: 8px 0 0 8px;
            writing-mode: vertical-rl;
            font-weight: bold;
            font-size: 14px;
        }
        #bible-content { flex: 1; overflow-y: auto; margin-top: 15px; font-size: 15px; line-height: 1.6; }
        #bible-header { border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .pastor-bible-controls {
            background: #f8f9fa;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            display: none; /* Only for pastors */
        }
        .pastor-bible-controls input {
            width: 100%;
            padding: 8px;
            margin-bottom: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div id="notification-toast">You are now live!</div>
    
    <!-- Bible Sidebar -->
    <div id="bible-sidebar">
        <div id="bible-toggle">BIBLE</div>
        <div id="bible-header">
            <h2 style="margin:0;">Holy Bible</h2>
            <small id="current-verse-ref">Select a verse to read along</small>
        </div>
        <div id="bible-content">
            <p id="verse-text">Scripture will appear here when the Pastor shares a verse.</p>
        </div>
        
        <div class="pastor-bible-controls" id="pastor-bible-controls">
            <h4 style="margin: 0 0 10px 0;">Pastor Tools</h4>
            <input type="text" id="bible-ref-input" placeholder="e.g. John 3:16">
            <button class="control-btn" style="width:100%; background: #27ae60; font-size: 14px;" id="push-verse-btn">Push to Church</button>
        </div>
    </div>
    <div id="lobby-overlay">
        <div class="lobby-card">
            <h1>Sanctuary Lobby</h1>
            <p>Connect with your community in a virtual space.</p>
            
            <div class="input-group">
                <label for="username-input">Your Name</label>
                <input type="text" id="username-input" placeholder="e.g. John Doe" maxlength="20">
            </div>

            <div class="input-group">
                <label for="room-id-input">Service / Room ID</label>
                <input type="text" id="room-id-input" placeholder="e.g. sunday-morning" maxlength="30">
            </div>
            
            <div class="input-group">
                <label for="passcode-input">Admin Passcode (Optional)</label>
                <input type="password" id="passcode-input" placeholder="Enter if you are the host" maxlength="20">
            </div>

            <button id="join-btn">Join Service</button>
        </div>
    </div>

    <div id="canvas-container">
        <canvas id="churchMap"></canvas>
        <div id="video-container" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; overflow: hidden;"></div>
        <div id="ui-overlay">
            <div id="user-info">Connecting...</div>
            <div style="margin-top:5px; font-size: 10px; opacity: 0.8;">Click a seat to move & occupy</div>
        </div>

        <div id="chat-container">
            <div id="chat-messages"></div>
            <div id="chat-input-area">
                <input type="text" id="chat-input" placeholder="Type a message..." maxlength="100">
                <button id="chat-send">Send</button>
            </div>
        </div>

        <!-- Moderation & Raise Hand -->
        <div id="emoji-picker">
            <button class="emoji-btn" onclick="sendReaction('🙏')">🙏</button>
            <button class="emoji-btn" onclick="sendReaction('❤️')">❤️</button>
            <button class="emoji-btn" onclick="sendReaction('🙌')">🙌</button>
            <button class="emoji-btn" onclick="sendReaction('✨')">✨</button>
        </div>

        <div id="member-controls">
            <button id="raise-hand-btn" class="control-btn">Raise Hand ✋</button>
            <button id="screen-share-btn" class="control-btn">Share Screen 🖥️</button>
        </div>

        <div id="moderation-panel">
            <h3>✋ Raised Hands</h3>
            <ul id="raised-hands-list">
                <!-- Dynamically populated -->
            </ul>
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 15px 0;">
            <button id="clear-room-btn" style="width: 100%; padding: 10px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Clear All Users</button>
        </div>
    </div>

    <script id="firebase-config" type="application/json">
        {{ firebase_config | tojson }}
    </script>
    <script src="https://download.agora.io/sdk/release/AgoraRTC_N-4.20.0.js"></script>
    <script type="module" src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
